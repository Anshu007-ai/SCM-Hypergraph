# -------------------------------------------------------
# nginx.conf  -  HT-HGNN Frontend Reverse-Proxy Config
# Serves the React/Vite static build and proxies /api
# requests to the FastAPI backend container.
# -------------------------------------------------------

server {
    listen       80;
    server_name  localhost;

    # Serve the React SPA
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback - any route that is not a real file gets index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the FastAPI backend service
    # The vite dev proxy strip /api prefix, replicate that here:
    #   /api/health  ->  backend:8000/health
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (used by real-time stream endpoint)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts for long-running inference calls
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Disable favicon 404 noise
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }
}
